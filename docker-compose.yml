services:
  bus-counter-ai:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bus-counter-ai
    environment:
      - HTTP_ADDR=:8080
      - DATA_DIR=/app/data
      - MODEL_PATH=yolov8n.pt
      - TARGET_CLASS=bus
      - CONFIDENCE=0.25
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"
    restart: unless-stopped
